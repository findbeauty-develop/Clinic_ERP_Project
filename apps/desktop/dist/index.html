<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaclit ERP</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0f172a;
      }
      #jaclit-app-frame {
        border: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <!--
      Do not replace the whole WebView with https:// — macOS WebKit blocks ipc:// from HTTPS
      (mixed content), so Tauri invoke() breaks. Keep this document on the Tauri asset origin and
      load the live site inside an iframe; the app uses postMessage to proxy invoke (see
      apps/frontend/lib/tauri-desktop-notification.ts).
    -->
    <iframe
      id="jaclit-app-frame"
      title="Jaclit ERP"
      src="https://clinic.jaclit.com/?jaclit_desktop_shell=1"
      allow="clipboard-read; clipboard-write; fullscreen"
    ></iframe>
    <script>
      (function () {
        function isAllowedChildOrigin(origin) {
          return (
            origin === "https://clinic.jaclit.com" ||
            origin === "https://www.clinic.jaclit.com"
          );
        }
        window.addEventListener("message", function (e) {
          if (!isAllowedChildOrigin(e.origin)) return;
          var msg = e.data;
          if (!msg || msg.v !== 1 || msg.t !== "invoke") return;
          var cmd = msg.cmd;
          if (cmd !== "show_native_notification") return;
          var id = msg.id;
          var payload = msg.payload;
          var target = e.source;
          var childOrigin = e.origin;
          var internals = window.__TAURI_INTERNALS__;
          if (!internals || typeof internals.invoke !== "function") {
            console.warn(
              "[Jaclit shell] __TAURI_INTERNALS__.invoke missing; cannot proxy",
              cmd
            );
            if (target && typeof target.postMessage === "function") {
              target.postMessage(
                {
                  v: 1,
                  t: "invoke-result",
                  id: id,
                  ok: false,
                  err: "Tauri invoke API not available in shell page",
                },
                childOrigin
              );
            }
            return;
          }
          internals
            .invoke(cmd, payload)
            .then(function (data) {
              if (target && typeof target.postMessage === "function") {
                target.postMessage(
                  { v: 1, t: "invoke-result", id: id, ok: true, data: data },
                  childOrigin
                );
              }
            })
            .catch(function (err) {
              if (target && typeof target.postMessage === "function") {
                target.postMessage(
                  {
                    v: 1,
                    t: "invoke-result",
                    id: id,
                    ok: false,
                    err: err != null ? String(err) : "invoke failed",
                  },
                  childOrigin
                );
              }
            });
        });
      })();

      // Safari / Web Inspector: select the **top** document (Tauri shell), then run:
      //   jaclitDebugShellInvoke()
      //   jaclitDebugShellInvoke({ title: "A", body: "B" })
      // If this works but clinic iframe does not → bridge/postMessage or web code.
      // If this fails → Rust / macOS Notifications / Tauri IPC on the shell document.
      window.jaclitDebugShellInvoke = function (opts) {
        opts = opts || {};
        var title = typeof opts.title === "string" ? opts.title : "Jaclit ERP";
        var body =
          typeof opts.body === "string" ? opts.body : "Shell → Rust invoke test";
        var internals = window.__TAURI_INTERNALS__;
        if (!internals || typeof internals.invoke !== "function") {
          console.error(
            "[Jaclit shell] jaclitDebugShellInvoke: __TAURI_INTERNALS__.invoke missing"
          );
          return Promise.reject(new Error("invoke missing"));
        }
        console.info("[Jaclit shell] jaclitDebugShellInvoke → show_native_notification");
        return internals
          .invoke("show_native_notification", { title: title, body: body })
          .then(function (r) {
            console.info("[Jaclit shell] jaclitDebugShellInvoke ok", r);
            return r;
          })
          .catch(function (e) {
            console.error("[Jaclit shell] jaclitDebugShellInvoke error", e);
            throw e;
          });
      };
    </script>
  </body>
</html>
